syntax = "proto3";

package common.v1;

option go_package = "github.com/paper-board/proto/gen/go/common/v1;commonv1";

message UsageMetrics {
  uint64 cpu_ms              = 1;
  uint64 memory_peak_bytes   = 2;
  uint64 memory_avg_bytes    = 3;
  uint64 disk_read_bytes     = 4;
  uint64 disk_write_bytes    = 5;
  uint64 network_egress_bytes  = 6;
  uint64 network_ingress_bytes = 7;
  uint64 gpu_ms              = 8;
  uint64 gpu_memory_bytes    = 9;
}
