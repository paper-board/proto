// Health is provided via the standard grpc.health.v1.Health.Check protocol; do not redefine.
// ExecSession (bidi) deferred to Phase 5 per D24.

syntax = "proto3";

package runtime.v1;

option go_package = "github.com/paper-board/proto/gen/go/runtime/v1;runtimev1";

import "environments/v1/environments.proto";
import "google/protobuf/timestamp.proto";

service RuntimeService {
  // Invoke forwards an agent prompt invocation through the runtime pod, streaming
  // events back to the caller. Tenant context is propagated via gRPC metadata
  // (x-tenant-id / x-org-id per ADR-0005) — not in the request body.
  rpc Invoke (InvokeRequest) returns (stream InvokeEvent);
}

// ProvisionService creates per-session pods with environment config and vault credentials.
service ProvisionService {
  rpc Provision (ProvisionRequest) returns (ProvisionResponse);
  rpc Terminate (TerminateRequest) returns (TerminateResponse);
}

// ProvisionRequest carries all inputs required to create a session pod.
message ProvisionRequest {
  string org_id     = 1;
  string session_id = 2;
  string user_id    = 3;
  string agent_id   = 4;
  string env_id     = 5;
  // EnvConfig from the environments service (container image, packages, network policy).
  paperboard.environments.v1.EnvironmentConfig env_config = 6;
  // Non-sensitive env vars from environments service.
  map<string, string> env_vars = 7;
  // VaultSecretRef is the k8s Secret name holding vault credentials.
  // Empty means no vault credentials.
  string vault_secret_ref = 8;
}

// ProvisionResponse is returned after a session pod is created.
message ProvisionResponse {
  string pod_name            = 1;
  string network_policy_name = 2;
  google.protobuf.Timestamp provisioned_at = 3;
}

// TerminateRequest tears down a session pod and emits termination events.
message TerminateRequest {
  string org_id     = 1;
  string session_id = 2;
  string user_id    = 3;
  string agent_id   = 4;
  google.protobuf.Timestamp started_at = 5;
}

// TerminateResponse is empty; callers check for error only.
message TerminateResponse {}

// InvokeRequest wraps an agent prompt invocation.
// Tenant context propagated via gRPC metadata x-tenant-id / x-org-id (ADR-0005); not in request body.
message InvokeRequest {
  string             session_id  = 1;
  string             request_id  = 2;
  string             trace_id    = 3;
  repeated PromptMessage messages = 4;
}

// PromptMessage mirrors the agents REST API message shape (role + content).
message PromptMessage {
  string role    = 1;
  string content = 2;
}

// InvokeEvent is a server-streaming event returned by RuntimeService.Invoke.
message InvokeEvent {
  oneof event {
    TextChunk   text_chunk  = 1;
    TurnDone    turn_done   = 2;
    InvokeError error       = 3;
  }
  google.protobuf.Timestamp emitted_at = 10;
}

// TextChunk carries a partial LLM text response.
message TextChunk {
  string content = 1;
}

// TurnDone signals the end of a successful invocation turn with token accounting.
message TurnDone {
  int32 tokens_in  = 1;
  int32 tokens_out = 2;
}

// InvokeError signals a terminal error during invocation.
message InvokeError {
  string code    = 1;
  string message = 2;
}
