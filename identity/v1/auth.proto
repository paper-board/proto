syntax = "proto3";
package identity.v1;

option go_package = "github.com/paper-board/proto/gen/go/identity/v1;identityv1";

import "google/protobuf/timestamp.proto";

enum AuthMode {
  AUTH_MODE_UNSPECIFIED = 0;
  AUTH_MODE_JWT = 1;
  AUTH_MODE_API_KEY = 2;
}

enum Env {
  ENV_UNSPECIFIED = 0;
  ENV_LIVE = 1;
  ENV_TEST = 2;
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_OWNER = 1;
  ROLE_MEMBER = 2;
}

message AuthContext {
  string user_id = 1;
  string org_id = 2;
  AuthMode mode = 3;
  string auth_key_id = 4;
  string api_key_id = 5;
  string method = 6;
  Env env = 7;
  Role role = 8;
  google.protobuf.Timestamp expires_at = 9;
}

message VerifyAPIKeyRequest  { string api_key = 1; }
message VerifyAPIKeyResponse { AuthContext ctx = 1; }

message VerifyJWTRequest  { string token = 1; }
message VerifyJWTResponse { AuthContext ctx = 1; }

message IssueJWTRequest {
  string user_id = 1;
  string org_id = 2;
  int64  ttl_seconds = 3;
}
message IssueJWTResponse {
  string token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message GetPublicKeyRequest  { string kid = 1; }
message GetPublicKeyResponse {
  string kid = 1;
  bytes  public_key = 2;
  string algorithm = 3;
}

service AuthService {
  rpc VerifyAPIKey (VerifyAPIKeyRequest) returns (VerifyAPIKeyResponse);
  rpc VerifyJWT    (VerifyJWTRequest)    returns (VerifyJWTResponse);
  rpc IssueJWT     (IssueJWTRequest)     returns (IssueJWTResponse);
  rpc GetPublicKey (GetPublicKeyRequest) returns (GetPublicKeyResponse);
}
